<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Health OS"/>
<meta name="theme-color" content="#10b981"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<title>Kyle's Health OS</title>
<style>
  :root {
    --bg:        #080d1a;
    --bg2:       #0d1525;
    --surface:   rgba(255,255,255,0.04);
    --surface2:  rgba(255,255,255,0.07);
    --green:     #10b981;
    --green2:    #34d399;
    --amber:     #f59e0b;
    --amber2:    #fbbf24;
    --red:       #ef4444;
    --blue:      #60a5fa;
    --text:      #e8e3d8;
    --muted:     #6b7280;
    --muted2:    #9ca3af;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.12);
    --serif:     'DM Serif Display', Georgia, serif;
    --mono:      'DM Mono', monospace;
    --sans:      'DM Sans', sans-serif;
    --safe-top:  env(safe-area-inset-top, 0px);
    --safe-bot:  env(safe-area-inset-bottom, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    max-width: 480px; margin: 0 auto;
    position: relative; overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    padding: calc(var(--safe-top) + 14px) 18px 14px;
    background: linear-gradient(180deg, rgba(16,185,129,0.12) 0%, transparent 100%);
    border-bottom: 1px solid rgba(16,185,129,0.15);
    flex-shrink: 0;
  }
  .header-row { display:flex; justify-content:space-between; align-items:flex-start; }
  .header-eyebrow { font-family:var(--mono); font-size:10px; letter-spacing:0.18em; color:var(--green); text-transform:uppercase; }
  .header-date { font-family:var(--serif); font-size:26px; color:#f0ebe0; margin-top:2px; line-height:1; }
  .sober-badge {
    text-align:center;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.35);
    border-radius:14px; padding:8px 14px; flex-shrink:0;
  }
  .sober-num { font-family:var(--serif); font-size:30px; color:var(--green); line-height:1; }
  .sober-label { font-family:var(--mono); font-size:9px; color:var(--green2); letter-spacing:0.1em; text-transform:uppercase; margin-top:2px; }

  /* progress bars */
  .progress-row { display:flex; gap:12px; margin-top:14px; }
  .progress-item { flex:1; }
  .prog-label { font-family:var(--mono); font-size:9px; color:var(--muted); margin-bottom:4px; }
  .prog-track { height:3px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; }
  .prog-fill { height:100%; border-radius:4px; transition:width 0.5s cubic-bezier(.4,0,.2,1); }
  .prog-fill.meals { background:linear-gradient(90deg,var(--green),var(--green2)); }
  .prog-fill.workout { background:linear-gradient(90deg,var(--amber),var(--amber2)); }

  /* ── NAV ── */
  #nav {
    display:flex; flex-shrink:0;
    background:rgba(0,0,0,0.4); border-bottom:1px solid var(--border);
  }
  .nav-btn {
    flex:1; padding:10px 2px 8px; background:none; border:none; cursor:pointer;
    font-family:var(--mono); font-size:8px; letter-spacing:0.04em;
    color:var(--muted); border-bottom:2px solid transparent;
    transition:color 0.2s, border-color 0.2s;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .nav-btn.active { color:var(--green); border-bottom-color:var(--green); }
  .nav-btn.active.amber { color:var(--amber); border-bottom-color:var(--amber); }
  .nav-btn .nav-icon { font-size:20px; line-height:1; }

  /* ── SCROLL AREA ── */
  #scroll {
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding-bottom: calc(var(--safe-bot) + 20px);
  }
  #scroll::-webkit-scrollbar { display:none; }

  /* ── DAY PILLS ── */
  .day-pills {
    display:flex; gap:6px; overflow-x:auto; padding:14px 16px 0;
    -webkit-overflow-scrolling:touch;
  }
  .day-pills::-webkit-scrollbar { display:none; }
  .day-pill {
    flex-shrink:0; padding:6px 14px; border-radius:20px; border:1px solid var(--border2);
    background:var(--surface); cursor:pointer;
    font-family:var(--mono); font-size:11px; color:var(--muted2);
    transition:all 0.2s; white-space:nowrap;
  }
  .day-pill.active-green { background:var(--green); border-color:var(--green); color:#000; font-weight:600; }
  .day-pill.active-amber { background:var(--amber); border-color:var(--amber); color:#000; font-weight:600; }
  .day-pill.today-mark { border-color:rgba(16,185,129,0.4); color:var(--green2); }

  /* ── CARDS ── */
  .card {
    margin:10px 14px 0; border-radius:14px; overflow:hidden;
    border:1px solid var(--border); background:var(--surface);
  }
  .card-header {
    padding:13px 15px; display:flex; justify-content:space-between; align-items:center;
    cursor:pointer;
  }
  .card-header:active { background:rgba(255,255,255,0.04); }
  .card-body { padding:12px 15px; border-top:1px solid var(--border); }
  .card-eyebrow { font-family:var(--mono); font-size:9px; letter-spacing:0.14em; color:var(--amber); text-transform:uppercase; }
  .card-title { font-family:var(--serif); font-size:17px; color:var(--text); margin-top:2px; line-height:1.2; }
  .card-sub { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:2px; }

  /* ── CHECKROW ── */
  .check-row {
    display:flex; align-items:center; gap:11px;
    padding:11px 15px; border-bottom:1px solid var(--border);
    cursor:pointer; transition:background 0.15s;
  }
  .check-row:last-child { border-bottom:none; }
  .check-row:active { background:rgba(255,255,255,0.03); }
  .check-circle {
    width:22px; height:22px; border-radius:50%; flex-shrink:0;
    border:2px solid rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; transition:all 0.2s;
  }
  .check-circle.done { background:var(--green); border-color:var(--green); color:#000; font-weight:700; }
  .check-circle.amber-done { background:var(--amber); border-color:var(--amber); color:#000; font-weight:700; }
  .check-circle.num { background:rgba(245,158,11,0.12); border-color:rgba(245,158,11,0.3); color:var(--amber); font-family:var(--mono); font-size:10px; font-weight:600; }
  .check-main { flex:1; }
  .check-title { font-size:14px; font-weight:500; transition:color 0.2s, text-decoration 0.2s; }
  .check-title.done { color:var(--muted); text-decoration:line-through; }
  .check-detail { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:2px; }
  .check-note { font-size:11px; color:var(--amber); margin-top:2px; }

  /* ── MACROS ── */
  .macro-row { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .macro-chip {
    padding:5px 10px; border-radius:8px; background:rgba(255,255,255,0.05);
    text-align:center; flex:1; min-width:56px;
  }
  .macro-val { font-family:var(--serif); font-size:16px; }
  .macro-lbl { font-family:var(--mono); font-size:8px; color:var(--muted); }

  /* ── SECTION HEADER ── */
  .sec-head {
    padding:16px 16px 8px; display:flex; align-items:center; gap:10px;
  }
  .sec-line { flex:1; height:1px; background:rgba(255,255,255,0.07); }
  .sec-text { font-family:var(--mono); font-size:9px; letter-spacing:0.16em; color:var(--muted); text-transform:uppercase; white-space:nowrap; }

  /* ── TODAY STATS GRID ── */
  .stats-grid {
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
    margin:10px 14px 0;
  }
  .stat-cell {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:10px 8px; text-align:center;
  }
  .stat-val { font-family:var(--serif); font-size:20px; line-height:1; }
  .stat-lbl { font-family:var(--mono); font-size:8px; color:var(--muted); margin-top:3px; }
  .stat-status { font-family:var(--mono); font-size:8px; margin-top:2px; }

  /* ── THEME BANNER ── */
  .theme-banner {
    margin:10px 14px 0;
    background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(16,185,129,0.08));
    border:1px solid rgba(245,158,11,0.2); border-radius:14px; padding:14px 16px;
  }
  .theme-eyebrow { font-family:var(--mono); font-size:9px; color:var(--amber); letter-spacing:0.14em; }
  .theme-name { font-family:var(--serif); font-size:22px; margin-top:3px; }
  .theme-macros { font-family:var(--mono); font-size:11px; color:var(--muted2); margin-top:4px; }

  /* ── WORKOUT CARD ── */
  .workout-banner {
    margin:10px 14px 0;
    background:rgba(245,158,11,0.06);
    border:1px solid rgba(245,158,11,0.18); border-radius:14px; padding:14px 16px;
  }
  .wk-top { display:flex; justify-content:space-between; align-items:flex-start; }
  .wk-title { font-family:var(--serif); font-size:17px; }
  .wk-sub { font-family:var(--mono); font-size:10px; color:var(--muted2); margin-top:3px; }
  .intensity-badge {
    padding:3px 10px; border-radius:20px; font-family:var(--mono); font-size:9px;
    background:rgba(0,0,0,0.35); flex-shrink:0; margin-left:8px;
  }
  .wk-tip {
    margin-top:10px; padding:9px 12px;
    background:rgba(245,158,11,0.07); border-radius:8px;
    font-size:12px; color:#fbbf24; line-height:1.55; font-style:italic;
    border-top:1px solid rgba(255,255,255,0.06);
  }

  /* ── SHOPPING ── */
  .shop-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 16px; border-bottom:1px solid rgba(255,255,255,0.04);
    cursor:pointer;
  }
  .shop-item:active { background:rgba(255,255,255,0.03); }
  .shop-check {
    width:20px; height:20px; border-radius:4px; flex-shrink:0;
    border:1px solid rgba(255,255,255,0.15);
    background:var(--surface);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; transition:all 0.2s;
  }
  .shop-check.done { background:var(--green); border-color:var(--green); color:#000; font-weight:700; }
  .shop-text { font-size:13px; color:var(--muted2); transition:all 0.2s; }
  .shop-text.done { color:var(--muted); text-decoration:line-through; }

  /* ── WEEK VIEW ── */
  .week-row {
    margin:8px 14px 0; padding:13px 15px; border-radius:12px;
    border:1px solid var(--border); background:var(--surface);
    display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; transition:background 0.15s;
  }
  .week-row:active { background:var(--surface2); }
  .week-row.today { border-color:rgba(16,185,129,0.35); background:rgba(16,185,129,0.06); }
  .week-day-name { font-family:var(--serif); font-size:15px; }
  .week-theme { font-size:11px; color:var(--muted); margin-top:2px; }
  .week-wk { font-family:var(--mono); font-size:11px; text-align:right; }
  .week-dur { font-family:var(--mono); font-size:9px; color:var(--muted); }

  /* ── SOBER MILESTONE ── */
  .sober-card {
    margin:16px 14px 0; padding:20px 16px; border-radius:14px; text-align:center;
    background:linear-gradient(135deg,rgba(16,185,129,0.12),rgba(52,211,153,0.04));
    border:1px solid rgba(16,185,129,0.25);
  }
  .sober-big { font-family:var(--serif); font-size:52px; color:var(--green); line-height:1; }
  .sober-since { font-size:12px; color:var(--muted2); margin-top:6px; line-height:1.5; }
  .sober-stats { display:flex; justify-content:center; gap:24px; margin-top:14px; }
  .sober-stat-val { font-family:var(--serif); font-size:22px; color:var(--text); }
  .sober-stat-lbl { font-family:var(--mono); font-size:9px; color:var(--muted); }

  /* ── INGREDIENT LIST ── */
  .ingredient { display:flex; align-items:flex-start; gap:8px; margin-bottom:6px; font-size:13px; color:#d1d5db; }
  .dot-green { color:var(--green); flex-shrink:0; margin-top:1px; font-size:16px; line-height:1; }

  /* ── WARMUP / COOLDOWN PILLS ── */
  .phase-pill {
    margin:8px 14px 0; padding:8px 13px; border-radius:8px; font-size:12px; line-height:1.4;
  }
  .phase-pill.warm { background:rgba(16,185,129,0.07); color:#6ee7b7; }
  .phase-pill.cool { background:rgba(96,165,250,0.07); color:#93c5fd; }

  /* ── PROGRESS PHOTOS ── */
  .photo-capture-btn {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    margin:14px 14px 0; padding:22px; border-radius:16px; cursor:pointer;
    background:linear-gradient(135deg,rgba(16,185,129,0.1),rgba(52,211,153,0.05));
    border:2px dashed rgba(16,185,129,0.35); gap:8px;
    transition:background 0.2s;
  }
  .photo-capture-btn:active { background:rgba(16,185,129,0.15); }
  .photo-capture-icon { font-size:36px; line-height:1; }
  .photo-capture-label { font-family:var(--mono); font-size:11px; color:var(--green); letter-spacing:0.12em; }
  .photo-capture-sub { font-size:12px; color:var(--muted); text-align:center; }

  .photo-entry {
    margin:10px 14px 0; border-radius:14px; overflow:hidden;
    border:1px solid var(--border); background:var(--surface);
    cursor:pointer; transition:border-color 0.2s;
  }
  .photo-entry:active { border-color:rgba(16,185,129,0.3); }
  .photo-thumb { width:100%; height:220px; object-fit:cover; display:block; }
  .photo-meta { padding:12px 14px; }
  .photo-date { font-family:var(--mono); font-size:9px; color:var(--green); letter-spacing:0.12em; margin-bottom:4px; }
  .photo-weight { font-family:var(--serif); font-size:20px; color:var(--text); }
  .photo-sober { font-family:var(--mono); font-size:10px; color:var(--muted2); margin-top:2px; }
  .photo-note-text { font-size:12px; color:var(--muted2); margin-top:6px; line-height:1.4; font-style:italic; }

  .photo-empty {
    margin:40px 14px; text-align:center; padding:40px 20px;
    border:1px dashed rgba(255,255,255,0.1); border-radius:16px;
  }
  .photo-empty-icon { font-size:48px; margin-bottom:12px; }
  .photo-empty-title { font-family:var(--serif); font-size:20px; margin-bottom:6px; }
  .photo-empty-sub { font-size:13px; color:var(--muted); line-height:1.5; }

  /* add entry form */
  .photo-form {
    display:none; position:fixed; inset:0; z-index:150;
    background:rgba(8,13,26,0.97); flex-direction:column;
    max-width:480px; margin:0 auto;
    padding:calc(env(safe-area-inset-top,0px)+16px) 18px 20px;
    overflow-y:auto;
  }
  .photo-form.open { display:flex; }
  .pf-label { font-family:var(--mono); font-size:9px; color:var(--green); letter-spacing:0.12em; margin-bottom:6px; }
  .pf-input {
    width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
    border-radius:10px; padding:12px 14px; color:var(--text);
    font-family:var(--sans); font-size:15px; outline:none; margin-bottom:14px;
  }
  .pf-input:focus { border-color:rgba(16,185,129,0.4); }
  .pf-preview { width:100%; max-height:260px; object-fit:cover; border-radius:12px; margin-bottom:14px; display:none; }
  .pf-save-btn {
    width:100%; padding:14px; background:var(--green); color:#000;
    border:none; border-radius:12px; font-family:var(--mono); font-size:13px;
    font-weight:700; cursor:pointer; letter-spacing:0.06em; margin-top:4px;
  }
  .pf-cancel-btn {
    width:100%; padding:12px; background:none; color:var(--muted);
    border:1px solid var(--border); border-radius:12px; font-family:var(--mono);
    font-size:12px; cursor:pointer; margin-top:8px;
  }


  /* ── MEAL/WORKOUT LOG ── */
  .log-area {
    margin:0 14px; border-radius:0 0 12px 12px;
    background:rgba(16,185,129,0.06); border:1px solid rgba(16,185,129,0.15);
    border-top:none; padding:10px 12px;
  }
  .log-label { font-family:var(--mono); font-size:9px; color:var(--green); letter-spacing:0.12em; margin-bottom:5px; }
  .log-input {
    width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    border-radius:8px; padding:8px 10px; color:var(--text); font-family:var(--sans);
    font-size:13px; outline:none; resize:none; line-height:1.4;
  }
  .log-input:focus { border-color:rgba(16,185,129,0.4); }
  .log-saved { font-size:11px; color:var(--green); font-family:var(--mono); margin-top:4px; display:none; }

  /* ── FLEX TAB ── */
  .flex-category {
    margin:10px 14px 0; border-radius:14px; overflow:hidden;
    border:1px solid var(--border);
  }
  .flex-cat-header {
    padding:14px 16px; display:flex; align-items:center; gap:12px;
    cursor:pointer; background:var(--surface);
  }
  .flex-cat-header:active { background:var(--surface2); }
  .flex-cat-icon { font-size:24px; flex-shrink:0; }
  .flex-cat-title { font-family:var(--serif); font-size:17px; flex:1; }
  .flex-cat-dur { font-family:var(--mono); font-size:10px; color:var(--muted); }
  .flex-cat-arrow { font-size:11px; color:var(--muted); }
  .flex-cat-body { display:none; border-top:1px solid var(--border); }
  .flex-routine {
    padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .flex-routine:last-of-type { border-bottom:none; }
  .flex-routine-name { font-weight:600; font-size:14px; margin-bottom:3px; }
  .flex-routine-dur { font-family:var(--mono); font-size:9px; color:var(--amber); letter-spacing:0.1em; margin-bottom:6px; }
  .flex-routine-instruction { font-size:12px; color:var(--muted2); line-height:1.6; }
  .flex-log-area {
    margin:12px 14px 0; padding:12px 14px;
    background:rgba(167,139,250,0.06); border:1px solid rgba(167,139,250,0.2);
    border-radius:10px;
  }
  .flex-log-label { font-family:var(--mono); font-size:9px; color:#a78bfa; letter-spacing:0.12em; margin-bottom:5px; }

  /* animations */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .fade-up { animation:fadeUp 0.15s ease forwards; }
  .no-anim { animation:none; }

  /* install banner */
  #install-banner {
    position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
    background:#0d1a2e; border-top:1px solid rgba(16,185,129,0.3);
    padding:14px 18px calc(var(--safe-bot) + 14px);
    display:none; z-index:100; align-items:center; gap:12px;
  }
  #install-banner.show { display:flex; }
  #install-btn {
    flex:1; background:var(--green); color:#000; border:none; border-radius:10px;
    padding:10px; font-family:var(--mono); font-size:12px; font-weight:600; cursor:pointer;
  }
  #install-dismiss { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-row">
      <div>
        <div class="header-eyebrow">KYLE'S HEALTH OS</div>
        <div class="header-date" id="header-date">Loading...</div>
      </div>
      <div class="sober-badge">
        <div class="sober-num" id="sober-count">—</div>
        <div class="sober-label">days sober</div>
      </div>
    </div>
    <div class="progress-row">
      <div class="progress-item">
        <div class="prog-label" id="meal-prog-label">MEALS 0/4</div>
        <div class="prog-track"><div class="prog-fill meals" id="meal-prog" style="width:0%"></div></div>
      </div>
      <div class="progress-item">
        <div class="prog-label" id="wk-prog-label">WORKOUT 0/0</div>
        <div class="prog-track"><div class="prog-fill workout" id="wk-prog" style="width:0%"></div></div>
      </div>
    </div>
  </div>

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function todayName() { return DAYS[new Date().getDay()]; }

function daysSober() {
  return Math.floor((new Date() - SOBRIETY_START) / 86400000);
}

function fmt(d) {
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}

function countChecked(prefix, total) {
  let n = 0;
  for (let i = 0; i < total; i++) if (checkedMeals[prefix + i]) n++;
  return n;
}

function updateHeader() {
  document.getElementById('header-date').textContent = fmt(new Date());
  document.getElementById('sober-count').textContent = daysSober();

  const todayMeals = MEAL_PLAN[todayName()].meals;
  const mealKeys = Object.keys(todayMeals);
  let mc = 0; mealKeys.forEach(k => { if (checkedMeals[todayName()+'-'+k]) mc++; });
  const mt = mealKeys.length;
  document.getElementById('meal-prog-label').textContent = `MEALS ${mc}/${mt}`;
  document.getElementById('meal-prog').style.width = (mc/mt*100)+'%';

  const wk = WORKOUT_PLAN[todayName()];
  let wc = 0;
  wk.exercises.forEach((_, i) => { if (checkedEx[todayName()+'-'+i]) wc++; });
  const wt = wk.exercises.length;
  document.getElementById('wk-prog-label').textContent = `WORKOUT ${wc}/${wt}`;
  document.getElementById('wk-prog').style.width = (wt > 0 ? wc/wt*100 : 0)+'%';
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
// Full render — only called on tab/day switches, never on checkbox taps
let _renderPending = false;
function render(animate) {
  if (_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(() => {
    _renderPending = false;
    updateHeader();
    const scroll = document.getElementById('scroll');

    let html = '';
    if (currentTab === 'today') html = renderToday();
    else if (currentTab === 'meals') html = renderMeals();
    else if (currentTab === 'workout') html = renderWorkout();
    else if (currentTab === 'shop') html = renderShop();
    else if (currentTab === 'week') html = renderWeek();
    else if (currentTab === 'flex') html = renderFlex();
    else if (currentTab === 'progress') html = renderProgress();

    scroll.innerHTML = (animate !== false ? '<div class="fade-up">' : '<div class="no-anim">') + html + '</div>';
    scroll.scrollTop = 0;
  });
}

// ─── DIRECT DOM UPDATES (zero rerender — instant on phone) ────────────────────
function toggleMealDom(key) {
  const val = checkedMeals[key];
  // Update circle
  const circle = document.querySelector(`.check-circle[data-meal-key="${key}"]`);
  if (circle) {
    circle.className = 'check-circle' + (val ? ' done' : '');
    circle.textContent = val ? '✓' : '';
  }
  // Update title strikethrough
  const title = document.querySelector(`.check-title[data-meal-key="${key}"]`);
  if (title) title.className = 'check-title' + (val ? ' done' : '');
  // Update header progress
  updateHeader();
}

function toggleExDom(key, idx) {
  const val = checkedEx[key];
  const circle = document.querySelector(`.check-circle[data-ex-key="${key}"]`);
  if (circle) {
    circle.className = 'check-circle' + (val ? ' amber-done' : ' num');
    circle.textContent = val ? '✓' : String(idx + 1);
  }
  const title = document.querySelector(`.check-title[data-ex-key="${key}"]`);
  if (title) title.className = 'check-title' + (val ? ' done' : '');
  updateHeader();
}

function toggleShopDom(key) {
  const val = checkedShop[key];
  const box = document.querySelector(`.shop-check[data-shop-key="${key}"]`);
  if (box) { box.className = 'shop-check' + (val ? ' done' : ''); box.textContent = val ? '✓' : ''; }
  const txt = document.querySelector(`.shop-text[data-shop-key="${key}"]`);
  if (txt) txt.className = 'shop-text' + (val ? ' done' : '');
  // Update progress bar
  const total = Object.values(SHOPPING).flat().length;
  const done = Object.values(checkedShop).filter(Boolean).length;
  const bar = document.getElementById('shop-prog-bar');
  const lbl = document.getElementById('shop-prog-label');
  if (bar) bar.style.width = (done/total*100)+'%';
  if (lbl) lbl.textContent = `${done}/${total} items · Liver-healing · Low sodium`;
}

function toggleMealExpandDom(mealKey) {
  const body = document.getElementById('meal-body-' + mealKey);
  const arrow = document.getElementById('meal-arrow-' + mealKey);
  if (!body) return;
  const isOpen = body.style.display !== 'none' && body.style.display !== '';
  if (isOpen) {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '▼';
    expandedMeal = null;
  } else {
    // Close any other open meal first
    document.querySelectorAll('.meal-body').forEach(el => { el.style.display = 'none'; });
    document.querySelectorAll('.meal-arrow').forEach(el => { el.textContent = '▼'; });
    body.style.display = 'block';
    if (arrow) arrow.textContent = '▲';
    expandedMeal = mealKey;
  }
}

      <div style="font-family:var(--serif);font-size:22px">Weekly Shopping List</div>
      <div id="shop-prog-label" style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px">${done}/${total} items · Liver-healing · Low sodium</div>
      <div style="margin-top:8px;height:3px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden">
        <div id="shop-prog-bar" style="height:100%;width:${total?done/total*100:0}%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:4px;transition:width 0.4s"></div>
      </div>
    </div>`;

  Object.entries(SHOPPING).forEach(([cat, items])=>{
    html += `<div class="sec-head"><div class="sec-line"></div><div class="sec-text">${cat}</div><div class="sec-line"></div></div>`;
    items.forEach((item,i)=>{
      const key = cat+'-'+i;
      const d = checkedShop[key];
      html += `<div class="shop-item" data-action="shop" data-key="${key}">
        <div class="shop-check${d?' done':''}" data-shop-key="${key}">${d?'✓':''}</div>
        <span class="shop-text${d?' done':''}" data-shop-key="${key}">${item}</span>
      </div>`;
    });
  });
  return html;
}

// ── WEEK ───────────────────────────────────────────────────────────────────────
function renderWeek() {
  const today = todayName();
  const ds = daysSober();

  let rows = DAYS.map(d=>{
    const w = WORKOUT_PLAN[d];
    const m = MEAL_PLAN[d];
    const ic = INTENSITY_COLOR[w.intensity] || '#9ca3af';
    const isToday = d===today;
    return `<div class="week-row${isToday?' today':''}" data-action="weekDay" data-day="${d}">
      <div>
        <div class="week-day-name">${d}${isToday?' <span style="font-family:var(--mono);font-size:9px;background:var(--green);color:#000;padding:2px 6px;border-radius:8px;vertical-align:middle;margin-left:6px">TODAY</span>':''}</div>
        <div class="week-theme">${m.theme}</div>
      </div>
      <div style="text-align:right">
        <div class="week-wk" style="color:${ic}">${w.type.split('—')[0].trim()}</div>
        <div class="week-dur">${w.duration}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="padding:16px 16px 8px">
      <div style="font-family:var(--serif);font-size:22px">This Week</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px">Tap any day for full details</div>
    </div>
    ${rows}
    <div class="sober-card">
      <div style="font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:0.14em;margin-bottom:6px">SOBRIETY COUNTER</div>
      <div class="sober-big">${ds}</div>
      <div class="sober-since">Days sober since October 5, 2025.<br>This is why your labs are improving. Keep going.</div>
      <div class="sober-stats">
        <div><div class="sober-stat-val">${Math.floor(ds/7)}</div><div class="sober-stat-lbl">WEEKS</div></div>
        <div><div class="sober-stat-val">${(ds/30.4).toFixed(1)}</div><div class="sober-stat-lbl">MONTHS</div></div>
        <div><div class="sober-stat-val">June</div><div class="sober-stat-lbl">NEXT CHECK</div></div>
      </div>
    </div>
    <div style="height:8px"></div>`;
}

// ─── EVENT DELEGATION ─────────────────────────────────────────────────────────
function attachHandlers() { /* no-op — single persistent listener below */ }

document.addEventListener('click', function(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  if (action === 'meal') {
    // Checkbox tap — zero rerender, direct DOM only
    const key = el.dataset.key;
    checkedMeals[key] = !checkedMeals[key];
    save();
    toggleMealDom(key);

  } else if (action === 'ex') {
    const key = el.dataset.key;
    const idx = parseInt(el.dataset.idx || '0');
    checkedEx[key] = !checkedEx[key];
    save();
    toggleExDom(key, idx);

  } else if (action === 'shop') {
    const key = el.dataset.key;
    checkedShop[key] = !checkedShop[key];
    save();
    toggleShopDom(key);

  } else if (action === 'toggleMeal') {
    toggleMealExpandDom(el.dataset.meal);

  } else if (action === 'dayM' || action === 'dayW') {
    selectedDay = el.dataset.day;
    expandedMeal = null;
    render(false);

  } else if (action === 'weekDay') {
    selectedDay = el.dataset.day;
    switchTab('today');
  } else if (action === 'toggleFlex') {
    const key = el.dataset.flex;
    const body = document.getElementById('flex-body-'+key);
    const arrow = document.getElementById('flex-arrow-'+key);
    if (!body) return;
    const isOpen = body.style.display === 'block';
    body.style.display = isOpen ? 'none' : 'block';
    if (arrow) arrow.textContent = isOpen ? '▼' : '▲';
  } else if (action === 'openPhoto') {
    openPhotoModal(el.dataset.id);
  }
});

// ── FLEX / GOLF HOME PROGRAM ──────────────────────────────────────────────────
function renderFlex() {
  const today = new Date().toISOString().split('T')[0];
  const todayLog = flexLog[today] || '';
  const cats = Object.entries(FLEX_PROGRAM);

  const catCards = cats.map(([key, cat]) => {
    const routines = cat.routines.map(r => `
      <div class="flex-routine">
        <div class="flex-routine-name" style="color:${cat.color}">${r.name}</div>
        <div class="flex-routine-dur">${r.duration.toUpperCase()}</div>
        <div class="flex-routine-instruction">${r.instruction}</div>
      </div>`).join('');
    return `<div class="flex-category">
      <div class="flex-cat-header" data-action="toggleFlex" data-flex="${key}">
        <div class="flex-cat-icon">${cat.icon}</div>
        <div style="flex:1">
          <div class="flex-cat-title">${cat.title}</div>
          <div class="flex-cat-dur">${cat.duration} · ${cat.routines.length} exercises</div>
        </div>
        <div class="flex-cat-arrow" id="flex-arrow-${key}">▼</div>
      </div>
      <div class="flex-cat-body" id="flex-body-${key}" style="display:none">
        <div style="padding:10px 16px;font-size:12px;color:var(--muted2);line-height:1.5;border-bottom:1px solid var(--border)">${cat.description}</div>
        ${routines}
      </div>
    </div>`;
  }).join('');

  return `
    <div style="padding:16px 16px 0">
      <div style="font-family:var(--serif);font-size:22px">Golf Flex & Home</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px">Yoga · Mobility · Breathing · Balance</div>
    </div>
    <div style="margin:10px 14px 0;padding:12px 14px;background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.2);border-radius:12px;font-size:13px;color:var(--muted2);line-height:1.55">
      💡 <strong style="color:var(--text)">Even 10 min counts:</strong> Hip mobility + 5 min box breathing before a round is measurably better than nothing. Tap any category for full instructions.
    </div>
    ${catCards}
    <div class="flex-log-area">
      <div class="flex-log-label">LOG WHAT YOU DID TODAY</div>
      <textarea class="log-input" rows="3" placeholder="e.g. 10 min hip mobility, 5 min box breathing..." onblur="saveFlexLog('${today}',this.value)">${todayLog}</textarea>
      ${todayLog ? `<div style="font-family:var(--mono);font-size:9px;color:var(--green);margin-top:4px">✓ Logged for today</div>` : ''}
    </div>
    <div style="height:16px"></div>`;
}

// ── PROGRESS ───────────────────────────────────────────────────────────────────
function renderProgress() {
  const sorted = [...progressPhotos].sort((a,b) => new Date(b.date) - new Date(a.date));
  const count = sorted.length;

  let timelineHTML = '';
  if (count === 0) {
    timelineHTML = `<div class="photo-empty">
      <div class="photo-empty-icon">📸</div>
      <div class="photo-empty-title">No photos yet</div>
      <div class="photo-empty-sub">Tap the button above to take your first progress photo. One photo a week tells your whole story.</div>
    </div>`;
  } else {
    timelineHTML = sorted.map((p, i) => {
      const d = new Date(p.date);
      const dateStr = d.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
      const weekNum = count - i;
      return `<div class="photo-entry" data-action="openPhoto" data-id="${p.id}">
        <img class="photo-thumb" src="${p.dataUrl}" loading="lazy"/>
        <div class="photo-meta">
          <div class="photo-date">WEEK ${weekNum} · ${dateStr.toUpperCase()}</div>
          <div class="photo-weight">${p.weight ? p.weight + ' lbs' : 'Weight not recorded'}</div>
          <div class="photo-sober">Day ${p.daysSober} sober</div>
          ${p.note ? `<div class="photo-note-text">"${p.note}"</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  return `
    <div style="padding:16px 16px 0">
      <div style="font-family:var(--serif);font-size:22px">Progress Photos</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px">${count} photo${count!==1?'s':''} · Waist up · Weekly</div>
    </div>
    <div class="photo-capture-btn" onclick="openCamera()">
      <div class="photo-capture-icon">📷</div>
      <div class="photo-capture-label">TAKE THIS WEEK'S PHOTO</div>
      <div class="photo-capture-sub">Opens your camera directly</div>
    </div>
    ${timelineHTML}
    <div style="height:16px"></div>`;
}

// ─── CAMERA & PHOTO FORM ─────────────────────────────────────────────────────
function openCamera() {
  document.getElementById('camera-input').click();
}

document.getElementById('camera-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    pendingPhotoDataUrl = ev.target.result;
    openPhotoForm();
  };
  reader.readAsDataURL(file);
  this.value = ''; // reset so same file can be re-selected
});

function openPhotoForm() {
  const form = document.getElementById('photo-form');
  const preview = document.getElementById('pf-preview');
  const weightInput = document.getElementById('pf-weight');
  const noteInput = document.getElementById('pf-note');
  const dateInput = document.getElementById('pf-date');

  // Set today's date
  const today = new Date();
  dateInput.value = today.toISOString().split('T')[0];
  weightInput.value = '';
  noteInput.value = '';
  preview.src = pendingPhotoDataUrl;
  preview.style.display = 'block';
  form.classList.add('open');
}

function closePhotoForm() {
  document.getElementById('photo-form').classList.remove('open');
  pendingPhotoDataUrl = null;
}

function savePhoto() {
  if (!pendingPhotoDataUrl) return;
  const weight = document.getElementById('pf-weight').value.trim();
  const note = document.getElementById('pf-note').value.trim();
  const dateVal = document.getElementById('pf-date').value;
  const entryDate = dateVal ? new Date(dateVal + 'T12:00:00') : new Date();

  const entry = {
    id: Date.now().toString(),
    dataUrl: pendingPhotoDataUrl,
    date: entryDate.toISOString(),
    weight: weight,
    note: note,
    daysSober: daysSober()
  };

  progressPhotos.push(entry);
  savePhotos();
  closePhotoForm();
  render(false);
}

// ─── PHOTO MODAL ─────────────────────────────────────────────────────────────
let modalPhotoId = null;

function openPhotoModal(id) {
  const photo = progressPhotos.find(p => p.id === id);
  if (!photo) return;
  modalPhotoId = id;

  const d = new Date(photo.date);
  const dateStr = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  document.getElementById('modal-img').src = photo.dataUrl;
  document.getElementById('modal-date').textContent = dateStr.toUpperCase() + ' · DAY ' + photo.daysSober + ' SOBER';
  document.getElementById('modal-meta').textContent = photo.weight ? photo.weight + ' lbs' : 'Weight not recorded';
  document.getElementById('modal-note').textContent = photo.note || '';
  document.getElementById('modal-delete-btn').onclick = deletePhoto;

  const modal = document.getElementById('photo-modal');
  modal.style.display = 'flex';
}

function closePhotoModal() {
  document.getElementById('photo-modal').style.display = 'none';
  modalPhotoId = null;
}

function deletePhoto() {
  if (!modalPhotoId) return;
  if (!confirm('Delete this progress photo?')) return;
  progressPhotos = progressPhotos.filter(p => p.id !== modalPhotoId);
  savePhotos();
  closePhotoModal();
  render(false);
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  expandedMeal = null;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('active','amber');
    if (b.dataset.tab === tab) {
      b.classList.add('active');
      if (tab === 'workout') b.classList.add('amber');
    }
  });
  render();
}

// ─── PWA INSTALL ─────────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('installDismissed')) {
    document.getElementById('install-banner').classList.add('show');
  }
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('show');
  });
}

function dismissInstall() {
  localStorage.setItem('installDismissed', '1');
  document.getElementById('install-banner').classList.remove('show');
}

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
<!-- Photo entry form -->

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-shrink:0">

    <button onclick="closePhotoForm()" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px">✕</button>
  </div>

  <div class="pf-label">DATE</div>

  <div class="pf-label">NOTE (OPTIONAL)</div>
  <textarea id="pf-note" class="pf-input" rows="3" placeholder="How are you feeling? Any wins this week?" style="resize:none;font-size:14px;line-height:1.5"></textarea>

  <button class="pf-cancel-btn" onclick="closePhotoForm()">Cancel</button>
</div>

</body>
